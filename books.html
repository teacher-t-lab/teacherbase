<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おすすめ書籍 | TeacherBase</title>
<meta name="description" content="現場教員の目線で選んだ、本当に使える本だけを紹介。カテゴリ・教科タグで絞り込めます。">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ===== DESIGN SYSTEM ===== */
:root {
  --black: #111;
  --dark:  #2a2a2a;
  --mid:   #555;
  --soft:  #888;
  --faint: #bbb;
  --line:  #e5e5e5;
  --bg:    #f7f7f7;
  --white: #fff;
  --c-law:   #1a5e36;
  --c-ict:   #1a4e8a;
  --c-study: #8a4a10;
  --c-event: #1a6070;
  --c-book:  #4a2e9a;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', 'Inter', sans-serif;
  background: var(--white);
  color: var(--black);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ===== HEADER ===== */
header {
  background: var(--white);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--black);
}
.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--black);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.logo-icon svg { width: 18px; height: 18px; }
.logo-text {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.1;
  font-family: 'Inter', sans-serif;
}
.logo-sub {
  font-size: 10px;
  color: var(--soft);
  letter-spacing: 0.06em;
  display: block;
  margin-top: 1px;
  font-weight: 400;
}
nav { display: flex; align-items: center; }
nav a {
  color: var(--soft);
  text-decoration: none;
  font-size: 13px;
  font-weight: 400;
  padding: 8px 14px;
  letter-spacing: 0.02em;
  transition: color 0.15s;
}
nav a:hover { color: var(--black); }
nav a.active { color: var(--black); font-weight: 600; }

/* ===== PAGE HEADER ===== */
.page-header {
  border-bottom: 1px solid var(--line);
  padding: 52px 40px 48px;
  max-width: 1200px;
  margin: 0 auto;
}
.breadcrumb {
  font-size: 12px;
  color: var(--soft);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: 0.02em;
}
.breadcrumb a { color: var(--soft); text-decoration: none; }
.breadcrumb a:hover { color: var(--black); }
.page-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  color: var(--soft);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Inter', sans-serif;
}
.page-eyebrow::before { content: '■'; font-size: 7px; color: var(--black); }
.page-title {
  font-size: 52px;
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 18px;
  color: var(--black);
  font-family: 'Inter', sans-serif;
}
.page-desc {
  font-size: 14px;
  color: var(--mid);
  line-height: 1.9;
  max-width: 560px;
}
.book-count {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 24px;
  font-size: 13px;
  color: var(--mid);
}
.book-count strong {
  color: var(--black);
  font-size: 16px;
  font-weight: 800;
  font-family: 'Inter', sans-serif;
  letter-spacing: -0.01em;
}

/* ===== MAIN LAYOUT ===== */
.main-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 40px 80px;
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 48px;
  align-items: start;
}

/* ===== FILTER SIDEBAR ===== */
.filter-sidebar { display: flex; flex-direction: column; gap: 0; }
.filter-block {
  padding-bottom: 24px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--line);
}
.filter-block:last-child { border-bottom: none; margin-bottom: 0; }
.filter-block-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--black);
  text-transform: uppercase;
  margin-bottom: 14px;
  font-family: 'Inter', sans-serif;
}
.filter-list { display: flex; flex-direction: column; gap: 0; }
.filter-item {
  display: flex;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  font-size: 13px;
  color: var(--mid);
  transition: color 0.12s;
  user-select: none;
}
.filter-item:last-child { border-bottom: none; }
.filter-item:hover { color: var(--black); }
.filter-item.active { color: var(--black); font-weight: 600; }

/* Search */
.search-wrap { position: relative; }
.search-input {
  width: 100%;
  padding: 10px 12px 10px 36px;
  border: 1px solid var(--line);
  background: var(--white);
  font-size: 13px;
  font-family: inherit;
  color: var(--black);
  outline: none;
  transition: border-color 0.15s;
  border-radius: 0;
  -webkit-appearance: none;
}
.search-input:focus { border-color: var(--black); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: 0.35; }

/* Hashtags */
.hashtag-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.htag {
  padding: 4px 11px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid var(--line);
  background: var(--white);
  color: var(--mid);
  transition: all 0.12s;
  user-select: none;
  font-family: inherit;
  border-radius: 0;
  -webkit-appearance: none;
  letter-spacing: 0.02em;
}
.htag::before { content: '#'; opacity: 0.45; font-size: 9px; margin-right: 1px; }
.htag:hover { border-color: var(--black); color: var(--black); }
.htag.active { background: var(--black); color: white; border-color: var(--black); }
.htag.active::before { opacity: 0.6; }

/* ===== SORT ROW ===== */
.sort-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 10px;
}
.active-filters { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
.active-filter-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--black);
  color: white;
  font-size: 11px;
  padding: 4px 10px;
  letter-spacing: 0.04em;
}
.active-filter-chip button {
  background: none;
  border: none;
  color: white;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 0;
  opacity: 0.7;
}
.sort-select {
  font-size: 12px;
  font-family: inherit;
  color: var(--mid);
  border: 1px solid var(--line);
  background: var(--white);
  padding: 6px 10px;
  cursor: pointer;
  outline: none;
  border-radius: 0;
  -webkit-appearance: none;
}

/* ===== BOOKS GRID (generated by JS) ===== */
.books-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
}

/* Book card styles — must match class names generated by JS */
.book-card {
  background: var(--white);
  padding: 22px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: background 0.12s;
}
.book-card:hover { background: var(--bg); }

.book-header { display: flex; gap: 14px; align-items: flex-start; }

.book-cover-sm {
  width: 56px;
  height: 76px;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid var(--line);
}
.book-cover-placeholder {
  width: 56px;
  height: 76px;
  flex-shrink: 0;
  background: var(--bg);
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.book-tags-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 5px;
}
.btag {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  letter-spacing: 0.04em;
}
.btag-cat {
  background: var(--bg);
  color: var(--mid);
  border: 1px solid var(--line);
}
.btag-sub {
  background: transparent;
  color: var(--soft);
  border: 1px solid var(--line);
}
.btag-sub::before { content: '#'; opacity: 0.5; font-size: 9px; margin-right: 1px; }

.book-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.65;
  color: var(--black);
}
.book-author {
  font-size: 11px;
  color: var(--soft);
  margin-top: 3px;
}

.book-comment {
  font-size: 12px;
  color: var(--mid);
  line-height: 1.85;
  background: var(--bg);
  padding: 12px 14px;
  border-left: 3px solid var(--black);
  flex: 1;
}

.book-meta-row { display: flex; gap: 6px; flex-wrap: wrap; }
.bchip {
  font-size: 10px;
  color: var(--soft);
  background: var(--bg);
  padding: 3px 9px;
  border: 1px solid var(--line);
}

.book-buy { display: flex; gap: 5px; margin-top: auto; }
.btn-buy {
  flex: 1;
  padding: 9px 0;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  text-decoration: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 0.02em;
}
.btn-amzn { background: #FF9900; color: #111; }
.btn-raku  { background: #BF0000; color: white; }
.btn-buy:hover { opacity: 0.82; }

/* States */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 64px;
  color: var(--soft);
  background: var(--white);
}
.empty-state p { font-size: 15px; margin-top: 10px; }
.loading-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 64px;
  color: var(--soft);
  background: var(--white);
}
.loading-spinner {
  width: 32px;
  height: 32px;
  border: 2px solid var(--line);
  border-top-color: var(--black);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== FOOTER ===== */
footer {
  background: var(--black);
  padding: 40px 0;
  border-top: 1px solid var(--line);
}
.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-logo {
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.02em;
  font-family: 'Inter', sans-serif;
}
.footer-links { display: flex; gap: 24px; }
.footer-links a {
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  text-decoration: none;
  transition: color 0.12s;
}
.footer-links a:hover { color: var(--white); }

/* ===== ANIMATIONS ===== */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.books-grid { animation: fadeUp 0.4s ease both; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .main-wrap { grid-template-columns: 1fr; padding: 32px 20px 60px; }
  .filter-sidebar { display: none; }
  .books-grid { grid-template-columns: repeat(2, 1fr); }
  .page-header { padding: 36px 20px; }
  .page-title { font-size: 38px; }
  .header-inner { padding: 0 20px; }
}
@media (max-width: 560px) {
  .books-grid { grid-template-columns: 1fr; }
  .page-title { font-size: 30px; }
  nav a { padding: 8px 8px; font-size: 12px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <div>
        <span class="logo-text">TeacherBase</span>
        <span class="logo-sub">教員のための総合情報メディア</span>
      </div>
    </a>
    <nav>
      <a href="news.html">ニュース</a>
      <a href="news.html?cat=法改正">法改正</a>
      <a href="books.html" class="active">書籍紹介</a>
      <a href="index.html">TOP</a>
    </nav>
  </div>
</header>

<!-- PAGE HEADER -->
<div style="border-bottom: 1px solid var(--line);">
  <div class="page-header">
    <div class="breadcrumb">
      <a href="index.html">TOP</a>
      <span>›</span>
      <span>おすすめ書籍</span>
    </div>
    <div class="page-eyebrow">おすすめ書籍</div>
    <h1 class="page-title">Books</h1>
    <p class="page-desc">現場教員の目線で選んだ、本当に使える本だけを紹介しています。</p>
    <div class="book-count">現在 <strong id="count-display">—</strong> 冊を紹介中</div>
  </div>
</div>

<!-- MAIN -->
<div class="main-wrap">
  <aside class="filter-sidebar">
    <div class="filter-block">
      <div class="filter-block-title">キーワード検索</div>
      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" type="text" id="search-input" placeholder="書名・著者名で検索…">
      </div>
    </div>
    <div class="filter-block">
      <div class="filter-block-title">カテゴリ</div>
      <div class="filter-list" id="cat-filters">
        <div class="filter-item active" data-cat="all">すべて</div>
        <div class="filter-item" data-cat="授業設計">授業設計・指導法</div>
        <div class="filter-item" data-cat="学級経営">学級経営</div>
        <div class="filter-item" data-cat="探究・PBL">探究・PBL</div>
        <div class="filter-item" data-cat="進路">進路・大学受験</div>
        <div class="filter-item" data-cat="ICT・DX">ICT・DX・AI活用</div>
        <div class="filter-item" data-cat="働き方・法律">教員の働き方・法律</div>
        <div class="filter-item" data-cat="教育全般">教育全般・エッセイ</div>
      </div>
    </div>
    <div class="filter-block">
      <div class="filter-block-title">教科タグ（複数選択可）</div>
      <div class="hashtag-grid" id="sub-filters">
        <button class="htag active" data-sub="all">すべて</button>
        <button class="htag" data-sub="全教科共通">全教科共通</button>
        <button class="htag" data-sub="理科">理科</button>
        <button class="htag" data-sub="物理">物理</button>
        <button class="htag" data-sub="化学">化学</button>
        <button class="htag" data-sub="数学">数学</button>
        <button class="htag" data-sub="英語">英語</button>
        <button class="htag" data-sub="国語">国語</button>
        <button class="htag" data-sub="社会">社会</button>
        <button class="htag" data-sub="情報">情報</button>
        <button class="htag" data-sub="実技系">実技系</button>
      </div>
      <p style="font-size:11px;color:var(--faint);margin-top:10px;letter-spacing:0.02em;">複数タグをクリックでOR検索</p>
    </div>
  </aside>

  <main>
    <div class="sort-row">
      <div class="active-filters" id="active-filters"></div>
      <select class="sort-select" id="sort-select">
        <option value="default">登録順</option>
        <option value="new">新しい順</option>
        <option value="pages-asc">ページ数が少ない順</option>
      </select>
    </div>
    <div class="books-grid" id="books-grid">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>書籍データを読み込んでいます…</p>

</div>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">TeacherBase</div>
    <div class="footer-links">
      <a href="#">このサイトについて</a>
      <a href="#">プライバシーポリシー</a>
      <a href="#">お問い合わせ</a>
    </div>
  </div>
</footer>

<script>
let BOOKS = [];

const CAT_EMOJI = {
  "授業設計":   "📘",
  "学級経営":   "🏫",
  "探究・PBL":  "🔍",
  "進路":       "🎓",
  "ICT・DX":    "💻",
  "働き方・法律":"📗",
  "教育全般":   "📖",
};

let activeCat = 'all';
let activeSubs = new Set();
let searchQuery = '';
let sortBy = 'default';

function matchesSub(b) {
  if (activeSubs.size === 0) return true;
  return (b.tags || []).some(s => activeSubs.has(s));
}

function renderBooks() {
  let f = BOOKS.filter(b => {
    const cOk = activeCat === 'all' || b.category === activeCat;
    const sOk = matchesSub(b);
    const q = searchQuery.toLowerCase();
    const qOk = !q ||
      (b.title || '').toLowerCase().includes(q) ||
      (b.author || '').toLowerCase().includes(q) ||
      (b.tags || []).some(s => s.includes(q));
    return cOk && sOk && qOk;
  });

  if (sortBy === 'new') f.sort((a,b) => (b.year || 0) - (a.year || 0));
  else if (sortBy === 'pages-asc') f.sort((a,b) => (a.pages || 9999) - (b.pages || 9999));

  document.getElementById('count-display').textContent = f.length;

  if (!f.length) {
    document.getElementById('books-grid').innerHTML =
      '<div class="empty-state"><div style="font-size:36px">📭</div><p>条件に合う書籍が見つかりませんでした。</p></div>';
    return;
  }

  document.getElementById('books-grid').innerHTML = f.map(b => {
    const emoji = CAT_EMOJI[b.category] || '📚';
    const coverHtml = b.cover_url
      ? '<img class="book-cover-sm" src="' + b.cover_url + '" alt="' + (b.title || '').replace(/"/g,'') + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
        + '<div class="book-cover-placeholder" style="display:none">' + emoji + '</div>'
      : '<div class="book-cover-placeholder">' + emoji + '</div>';

    const subTags = (b.tags || []).map(s =>
      '<span class="btag btag-sub">' + s + '</span>'
    ).join('');

    const metaChips = [];
    if (b.pages) metaChips.push('<span class="bchip">📄 ' + b.pages + 'p</span>');
    if (b.year)  metaChips.push('<span class="bchip">🗓 ' + b.year + '年</span>');

    const amazonUrl  = b.amazon_url  || 'https://www.amazon.co.jp/s?k=' + b.isbn;
    const rakutenUrl = b.rakuten_url || 'https://books.rakuten.co.jp/search?sitem=' + b.isbn;

    const bodyText = b.comment || b.description || '';

    return '<div class="book-card">'
      + '<div class="book-header">'
      +   '<div style="display:flex;flex-direction:column;align-items:center;gap:0">' + coverHtml + '</div>'
      +   '<div style="flex:1;min-width:0;">'
      +     '<div class="book-tags-row"><span class="btag btag-cat">' + (b.category || '') + '</span>' + subTags + '</div>'
      +     '<div class="book-title">' + (b.title || '（タイトル取得中）') + '</div>'
      +     '<div class="book-author">' + (b.author || '') + '</div>'
      +   '</div>'
      + '</div>'
      + (bodyText ? '<div class="book-comment">' + bodyText + '</div>' : '')
      + (metaChips.length ? '<div class="book-meta-row">' + metaChips.join('') + '</div>' : '')
      + '<div class="book-buy">'
      +   '<a class="btn-buy btn-amzn" href="' + amazonUrl + '" target="_blank" rel="noopener">Amazonで見る</a>'
      +   '<a class="btn-buy btn-raku" href="' + rakutenUrl + '" target="_blank" rel="noopener">楽天で見る</a>'
      + '</div>'
      + '</div>';
  }).join('');
}

function updateChips() {
  const chips = [];
  if (activeCat !== 'all') chips.push(
    '<span class="active-filter-chip">' + activeCat + '<button onclick="clearCat()">×</button></span>'
  );
  activeSubs.forEach(s => chips.push(
    '<span class="active-filter-chip">#' + s + '<button onclick="clearSub(\'' + s + '\')">×</button></span>'
  ));
  if (searchQuery) chips.push(
    '<span class="active-filter-chip">"' + searchQuery + '"<button onclick="clearSearch()">×</button></span>'
  );
  document.getElementById('active-filters').innerHTML = chips.join('');
}

window.clearCat = () => {
  activeCat = 'all';
  document.querySelectorAll('#cat-filters .filter-item').forEach(e =>
    e.classList.toggle('active', e.dataset.cat === 'all'));
  refresh();
};
window.clearSub = s => {
  activeSubs.delete(s);
  document.querySelector('.htag[data-sub="' + s + '"]')?.classList.remove('active');
  updateAllBtn();
  refresh();
};
window.clearSearch = () => {
  searchQuery = '';
  document.getElementById('search-input').value = '';
  refresh();
};

function updateAllBtn() {
  document.querySelector('.htag[data-sub="all"]')?.classList.toggle('active', activeSubs.size === 0);
}

function refresh() { updateChips(); renderBooks(); }

document.querySelectorAll('#cat-filters .filter-item').forEach(el => {
  el.addEventListener('click', () => {
    activeCat = el.dataset.cat;
    document.querySelectorAll('#cat-filters .filter-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    refresh();
  });
});

document.querySelectorAll('#sub-filters .htag').forEach(el => {
  el.addEventListener('click', () => {
    const v = el.dataset.sub;
    if (v === 'all') {
      activeSubs.clear();
      document.querySelectorAll('#sub-filters .htag').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
    } else {
      document.querySelector('.htag[data-sub="all"]').classList.remove('active');
      if (activeSubs.has(v)) { activeSubs.delete(v); el.classList.remove('active'); }
      else { activeSubs.add(v); el.classList.add('active'); }
      updateAllBtn();
    }
    refresh();
  });
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  refresh();
});
document.getElementById('sort-select').addEventListener('change', e => {
  sortBy = e.target.value;
  refresh();
});

// data/books.json を読み込んで表示
fetch('data/books.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    BOOKS = data;
    refresh();
  })
  .catch(err => {
    console.error('books.json の読み込みに失敗:', err);
    document.getElementById('books-grid').innerHTML =
      '<div class="empty-state"><div style="font-size:36px">⚠️</div><p>書籍データの読み込みに失敗しました。しばらく後にお試しください。</p></div>';
  });
</script>
</body>
</html>
