<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教育ニュース | TeacherBase</title>
<meta name="description" content="文科省・教育新聞・各種メディアから、教員に関係するニュースを自動収集しています。">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ===== DESIGN SYSTEM ===== */
:root {
  --black: #111;
  --dark:  #2a2a2a;
  --mid:   #555;
  --soft:  #888;
  --faint: #bbb;
  --line:  #e5e5e5;
  --bg:    #f7f7f7;
  --white: #fff;
  --c-law:   #1a5e36;
  --c-ict:   #1a4e8a;
  --c-study: #8a4a10;
  --c-event: #1a6070;
  --c-book:  #4a2e9a;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', 'Inter', sans-serif;
  background: var(--white);
  color: var(--black);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ===== HEADER ===== */
header {
  background: var(--white);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--black);
}
.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--black);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.logo-icon svg { width: 18px; height: 18px; }
.logo-text {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.1;
  font-family: 'Inter', sans-serif;
}
.logo-sub {
  font-size: 10px;
  color: var(--soft);
  letter-spacing: 0.06em;
  display: block;
  margin-top: 1px;
  font-weight: 400;
}
nav { display: flex; align-items: center; }
nav a {
  color: var(--soft);
  text-decoration: none;
  font-size: 13px;
  font-weight: 400;
  padding: 8px 14px;
  letter-spacing: 0.02em;
  transition: color 0.15s;
}
nav a:hover { color: var(--black); }
nav a.active { color: var(--black); font-weight: 600; }

/* ===== PAGE HEADER ===== */
.page-header {
  border-bottom: 1px solid var(--line);
  padding: 52px 40px 48px;
  max-width: 1200px;
  margin: 0 auto;
}
.breadcrumb {
  font-size: 12px;
  color: var(--soft);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: 0.02em;
}
.breadcrumb a { color: var(--soft); text-decoration: none; }
.breadcrumb a:hover { color: var(--black); }
.page-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  color: var(--soft);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Inter', sans-serif;
}
.page-eyebrow::before { content: '■'; font-size: 7px; color: var(--black); }
.page-title {
  font-size: 52px;
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 18px;
  color: var(--black);
  font-family: 'Inter', sans-serif;
}
.page-desc {
  font-size: 14px;
  color: var(--mid);
  line-height: 1.9;
  max-width: 560px;
}
.page-meta-row {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.news-count {
  font-size: 13px;
  color: var(--mid);
  display: flex;
  align-items: center;
  gap: 5px;
}
.news-count strong {
  color: var(--black);
  font-size: 16px;
  font-weight: 800;
  font-family: 'Inter', sans-serif;
  letter-spacing: -0.01em;
}
.last-updated {
  font-size: 11px;
  color: var(--soft);
  letter-spacing: 0.02em;
}

/* ===== MAIN LAYOUT ===== */
.main-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px;
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 48px;
  padding-top: 48px;
  padding-bottom: 80px;
  align-items: start;
}

/* ===== FILTER SIDEBAR ===== */
.filter-sidebar { display: flex; flex-direction: column; gap: 0; }
.filter-block {
  padding-bottom: 24px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--line);
}
.filter-block:last-child { border-bottom: none; }
.filter-block-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--black);
  text-transform: uppercase;
  margin-bottom: 14px;
  font-family: 'Inter', sans-serif;
}
.filter-list { display: flex; flex-direction: column; gap: 0; }
.filter-item {
  display: flex;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  font-size: 13px;
  color: var(--mid);
  transition: color 0.12s;
  user-select: none;
}
.filter-item:last-child { border-bottom: none; }
.filter-item:hover { color: var(--black); }
.filter-item.active {
  color: var(--black);
  font-weight: 600;
}

/* Search */
.search-wrap { position: relative; }
.search-input {
  width: 100%;
  padding: 10px 12px 10px 36px;
  border: 1px solid var(--line);
  background: var(--white);
  font-size: 13px;
  font-family: inherit;
  color: var(--black);
  outline: none;
  transition: border-color 0.15s;
  border-radius: 0;
  -webkit-appearance: none;
}
.search-input:focus { border-color: var(--black); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: 0.35; }

/* Popular list in sidebar */
.popular-list { display: flex; flex-direction: column; }
.pop-item {
  display: flex;
  gap: 12px;
  padding: 11px 0;
  border-bottom: 1px solid var(--line);
  text-decoration: none;
  color: inherit;
  align-items: flex-start;
  transition: opacity 0.12s;
}
.pop-item:last-child { border-bottom: none; }
.pop-item:hover { opacity: 0.65; }
.pop-num {
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 800;
  color: var(--line);
  line-height: 1.3;
  flex-shrink: 0;
  width: 20px;
}
.pop-item:nth-child(1) .pop-num { color: var(--black); }
.pop-item:nth-child(2) .pop-num { color: var(--faint); }
.pop-item:nth-child(3) .pop-num { color: var(--faint); }
.pop-title { font-size: 12px; line-height: 1.7; color: var(--mid); }

/* ===== SORT ROW ===== */
.sort-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 10px;
}
.active-filters { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
.active-filter-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--black);
  color: white;
  font-size: 11px;
  padding: 4px 10px;
  letter-spacing: 0.04em;
}
.active-filter-chip button {
  background: none;
  border: none;
  color: white;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 0;
  opacity: 0.7;
}
.sort-select {
  font-size: 12px;
  font-family: inherit;
  color: var(--mid);
  border: 1px solid var(--line);
  background: var(--white);
  padding: 6px 10px;
  cursor: pointer;
  outline: none;
  border-radius: 0;
  -webkit-appearance: none;
}

/* ===== NEWS GRID (generated by JS) ===== */
.news-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
}

/* Card styles — must match class names generated by JS */
.news-card {
  background: var(--white);
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
  transition: background 0.12s;
  cursor: pointer;
}
.news-card:hover { background: var(--bg); }

.card-thumb {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.media-abbr { font-size: 13px; font-weight: 800; color: white; letter-spacing: 0.04em; }
.media-domain { display: none; }

/* Category background colors (flat) */
.thumb-法改正   { background: var(--c-law); }
.thumb-授業アイデア { background: var(--c-study); }
.thumb-ICT・AI  { background: var(--c-ict); }
.thumb-研修・イベント { background: var(--c-event); }
.thumb-書籍・論文 { background: var(--c-book); }
.thumb-default  { background: #555; }

.card-body {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.ctag {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 9px;
  letter-spacing: 0.05em;
  font-family: 'Inter', sans-serif;
}
.ctag-new          { background: var(--black); color: white; }
.ctag-法改正       { background: #e7f2ea; color: var(--c-law); }
.ctag-授業アイデア { background: #fdf3e8; color: var(--c-study); }
.ctag-ICT・AI      { background: #e7eef8; color: var(--c-ict); }
.ctag-研修・イベント { background: #e7f3f6; color: var(--c-event); }
.ctag-書籍・論文   { background: #f0edf9; color: var(--c-book); }

.card-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.65;
  color: var(--black);
}
.card-summary {
  font-size: 12px;
  color: var(--mid);
  line-height: 1.8;
  flex: 1;
}
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  margin-top: auto;
}
.card-meta   { font-size: 11px; color: var(--soft); }
.card-source { font-size: 10px; color: var(--soft); background: var(--bg); padding: 2px 8px; }

/* Featured card */
.news-card.featured {
  grid-column: 1 / -1;
  flex-direction: row;
}
.news-card.featured .card-thumb {
  width: 160px;
  height: auto;
  flex-shrink: 0;
}
.news-card.featured .card-title { font-size: 16px; }

/* States */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 64px;
  color: var(--soft);
  background: var(--white);
}
.empty-state p { font-size: 15px; margin-top: 10px; }
.loading-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 64px;
  color: var(--soft);
  background: var(--white);
}
.loading-spinner {
  width: 32px;
  height: 32px;
  border: 2px solid var(--line);
  border-top-color: var(--black);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== FOOTER ===== */
footer {
  background: var(--black);
  padding: 40px 0;
  border-top: 1px solid var(--line);
}
.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-logo {
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.02em;
  font-family: 'Inter', sans-serif;
}
.footer-links { display: flex; gap: 24px; }
.footer-links a {
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  text-decoration: none;
  transition: color 0.12s;
}
.footer-links a:hover { color: var(--white); }

/* ===== ANIMATIONS ===== */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.news-grid { animation: fadeUp 0.4s ease both; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .main-wrap { grid-template-columns: 1fr; padding-top: 32px; padding-left: 20px; padding-right: 20px; }
  .filter-sidebar { display: none; }
  .news-grid { grid-template-columns: 1fr; }
  .news-card.featured { flex-direction: column; }
  .news-card.featured .card-thumb { width: 100%; height: 56px; }
  .page-header { padding: 36px 20px; }
  .page-title { font-size: 38px; }
  .header-inner { padding: 0 20px; }
}
@media (max-width: 480px) {
  nav a { padding: 8px 8px; font-size: 12px; }
  .page-title { font-size: 30px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <div>
        <span class="logo-text">TeacherBase</span>
        <span class="logo-sub">教員のための総合情報メディア</span>
      </div>
    </a>
    <nav>
      <a href="news.html" class="active">ニュース</a>
      <a href="news.html?cat=法改正">法改正</a>
      <a href="books.html">書籍紹介</a>
      <a href="index.html">TOP</a>
    </nav>
  </div>
</header>

<!-- PAGE HEADER -->
<div style="border-bottom: 1px solid var(--line);">
  <div class="page-header">
    <div class="breadcrumb">
      <a href="index.html">TOP</a>
      <span>›</span>
      <span>ニュース</span>
    </div>
    <div class="page-eyebrow">教育ニュース</div>
    <h1 class="page-title">News</h1>
    <p class="page-desc">文科省・教育新聞・EdTechZineから、教員に関係する情報を自動収集しています。</p>
    <div class="page-meta-row">
      <div class="news-count">現在 <strong id="count-display">—</strong> 件表示中</div>
      <span class="last-updated" id="last-updated"></span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main-wrap">
  <aside class="filter-sidebar">
    <div class="filter-block">
      <div class="filter-block-title">キーワード検索</div>
      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" type="text" id="search-input" placeholder="キーワードで検索…">
      </div>
    </div>
    <div class="filter-block">
      <div class="filter-block-title">カテゴリ</div>
      <div class="filter-list" id="cat-filters">
        <div class="filter-item active" data-cat="all">すべて</div>
        <div class="filter-item" data-cat="法改正">⚖️ 法改正・文教省通知</div>
        <div class="filter-item" data-cat="授業アイデア">💡 授業・指導法アイデア</div>
        <div class="filter-item" data-cat="ICT・AI">🛠️ 教育技術・ICT・AI</div>
        <div class="filter-item" data-cat="研修・イベント">📅 研修・イベント情報</div>
        <div class="filter-item" data-cat="書籍・論文">📚 書籍・論文紹介</div>
      </div>
    </div>
    <div class="filter-block">
      <div class="filter-block-title">よく読まれている</div>
      <div class="popular-list" id="popular-list"></div>
    </div>
  </aside>

  <main>
    <div class="sort-row">
      <div class="active-filters" id="active-filters"></div>
      <select class="sort-select" id="sort-select">
        <option value="new">新しい順</option>
        <option value="popular">よく読まれている順</option>
      </select>
    </div>
    <div class="news-grid" id="news-grid">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>ニュースを読み込んでいます…</p>
      </div>
    </div>
  </main>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">TeacherBase</div>
    <div class="footer-links">
      <a href="#">このサイトについて</a>
      <a href="#">プライバシーポリシー</a>
      <a href="#">お問い合わせ</a>
    </div>
  </div>
</footer>

<script>
let NEWS = [];
const ABBR = {
  "文部科学省":"文科省","教育新聞":"教新","EdTechZine":"EdTech",
  "Yahoo!ニュース":"Yahoo!","TeacherBase":"TB","朝日EduA":"朝日","日経教育":"日経"
};

function getAbbr(source) {
  return ABBR[source] || source.slice(0, 4);
}

function loadClicks() {
  try {
    const s = JSON.parse(localStorage.getItem('tb_nc') || '{}');
    NEWS.forEach(n => { n.clicks = s[n.id] || 0; });
  } catch(e) {
    NEWS.forEach(n => { n.clicks = 0; });
  }
}
function saveClick(id) {
  try {
    const s = JSON.parse(localStorage.getItem('tb_nc') || '{}');
    s[id] = (s[id] || 0) + 1;
    localStorage.setItem('tb_nc', JSON.stringify(s));
    const item = NEWS.find(n => n.id === id);
    if (item) item.clicks = s[id];
  } catch(e) {}
}

let activeCat = 'all', searchQuery = '', sortBy = 'new';

const urlCat = new URLSearchParams(location.search).get('cat');
if (urlCat) activeCat = urlCat;

function renderPopular() {
  const top = [...NEWS].sort((a,b) => b.clicks - a.clicks).slice(0, 5);
  document.getElementById('popular-list').innerHTML = top.map((n,i) =>
    `<a class="pop-item" href="${n.url || '#'}" target="${n.url && n.url !== '#' ? '_blank' : '_self'}" rel="noopener" data-id="${n.id}">
      <span class="pop-num">${String(i+1).padStart(2,'0')}</span>
      <span class="pop-title">${n.title}</span>
    </a>`
  ).join('');
  document.querySelectorAll('#popular-list .pop-item').forEach(el => {
    el.addEventListener('click', () => { saveClick(+el.dataset.id); renderPopular(); });
  });
}

function updateChips() {
  const chips = [];
  if (activeCat !== 'all') chips.push(`<span class="active-filter-chip">${activeCat}<button onclick="clearCat()">×</button></span>`);
  if (searchQuery) chips.push(`<span class="active-filter-chip">"${searchQuery}"<button onclick="clearSearch()">×</button></span>`);
  document.getElementById('active-filters').innerHTML = chips.join('');
}

window.clearCat = () => {
  activeCat = 'all';
  document.querySelectorAll('#cat-filters .filter-item').forEach(e => e.classList.toggle('active', e.dataset.cat === 'all'));
  refresh();
};
window.clearSearch = () => {
  searchQuery = '';
  document.getElementById('search-input').value = '';
  refresh();
};

function renderNews() {
  let f = NEWS.filter(n => {
    const cOk = activeCat === 'all' || n.cat === activeCat;
    const q = searchQuery.toLowerCase();
    return cOk && (!q || n.title.includes(q) || (n.summary||'').includes(q) || n.source.includes(q));
  });
  if (sortBy === 'popular') f.sort((a,b) => b.clicks - a.clicks);
  else f.sort((a,b) => b.date.localeCompare(a.date));

  document.getElementById('count-display').textContent = f.length;

  if (!f.length) {
    document.getElementById('news-grid').innerHTML =
      '<div class="empty-state"><div style="font-size:36px">📭</div><p>条件に合う記事が見つかりませんでした。</p></div>';
    return;
  }

  document.getElementById('news-grid').innerHTML = f.map((n, i) => {
    const abbr = getAbbr(n.source);
    const feat = i === 0 && activeCat === 'all' && !searchQuery && sortBy === 'new';
    const thumbCat = ['法改正','授業アイデア','ICT・AI','研修・イベント','書籍・論文'].includes(n.cat) ? n.cat : 'default';
    const target = n.url && n.url !== '#' ? '_blank' : '_self';
    return `<a class="news-card${feat ? ' featured' : ''}" href="${n.url || '#'}" target="${target}" rel="noopener" data-id="${n.id}">
      <div class="card-thumb thumb-${thumbCat}">
        <span class="media-abbr">${abbr}</span>
        <span class="media-domain">${n.domain}</span>
      </div>
      <div class="card-body">
        <div class="card-tags">
          ${n.isNew ? '<span class="ctag ctag-new">NEW</span>' : ''}
          <span class="ctag ctag-${n.cat}">${n.cat}</span>
        </div>
        <div class="card-title">${n.title}</div>
        <div class="card-summary">${n.summary || ''}</div>
        <div class="card-footer">
          <span class="card-meta">${(n.date||'').replace(/-/g,'.')}</span>
          <span class="card-source">${n.source}</span>
        </div>
      </div>
    </a>`;
  }).join('');

  document.querySelectorAll('#news-grid .news-card').forEach(el => {
    el.addEventListener('click', () => { saveClick(+el.dataset.id); renderPopular(); });
  });
}

function refresh() { updateChips(); renderNews(); }

document.querySelectorAll('#cat-filters .filter-item').forEach(el => {
  el.classList.toggle('active', el.dataset.cat === activeCat || (activeCat === 'all' && el.dataset.cat === 'all'));
  el.addEventListener('click', () => {
    activeCat = el.dataset.cat;
    document.querySelectorAll('#cat-filters .filter-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    refresh();
  });
});
document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value.trim(); refresh(); });
document.getElementById('sort-select').addEventListener('change', e => { sortBy = e.target.value; renderNews(); });

// data/news.json を読み込んで表示
fetch('data/news.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    NEWS = data;
    loadClicks();
    if (NEWS.length > 0) {
      const latest = NEWS.reduce((a,b) => a.date > b.date ? a : b);
      document.getElementById('last-updated').textContent = '最終更新：' + latest.date.replace(/-/g,'.');
    }
    refresh();
    renderPopular();
  })
  .catch(err => {
    console.error('news.json の読み込みに失敗:', err);
    document.getElementById('news-grid').innerHTML =
      '<div class="empty-state"><div style="font-size:36px">⚠️</div><p>ニュースの読み込みに失敗しました。しばらく後にお試しください。</p></div>';
  });
</script>
</body>
</html>
